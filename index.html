<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bongo Basket | Create Account</title>
    <style>
        :root {
            --brand-gradient: linear-gradient(135deg, #a21caf 0%, #db2777 50%, #f97316 100%);
            --navy-dark: #1e1b4b;
            --brand-pink: #db2777;
            --brand-orange: #f97316;
            --bg-light: #fdf2f8; 
            --shadow: 0 10px 40px rgba(162, 28, 175, 0.15);
        }

         body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-light);
            background-image:
                radial-gradient(circle at 20% 20%, #ffdee9 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, #b5fffc 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, #c3bef0 0%, transparent 40%),
                linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin: 20px;
        }

        .logo-box { margin-bottom: 20px; }
        .logo-box img {
            max-width: 100px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        h2 {
            margin: 10px 0;
            color: var(--navy-dark);
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-wrapper {
            margin-bottom: 18px;
            text-align: left;
        }

        /* Secret Code Field Styling */
        #adminCodeWrapper {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--navy-dark);
            margin-bottom: 6px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background: #f8fafc;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--brand-pink);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(219, 39, 119, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: var(--brand-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(219, 39, 119, 0.4);
        }

        #message {
            margin-top: 15px;
            font-size: 13px;
            color: #ef4444;
            min-height: 18px;
            font-weight: 600;
        }

        .footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            font-size: 14px;
            color: #64748b;
        }

        .footer a {
            color: var(--brand-pink);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Bongo Basket Logo">
        </div>

        <h2>Join Bongo Basket</h2>
        <p class="subtitle">Experience Premium Shopping & Analytics</p>

        <form id="registerForm">
            <div class="input-wrapper">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a unique name" required>
            </div>

            <div class="input-wrapper">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="input-wrapper">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" required>
            </div>

            <div class="input-wrapper">
                <label>Account Type</label>
                <select id="role" required onchange="toggleAdminCode()">
                    <option value="" disabled selected>Select access level</option>
                    <option value="CUSTOMER">Customer (Shopping)</option>
                    <option value="ADMIN">Administrator (Management)</option>
                </select>
            </div>

            <div class="input-wrapper" id="adminCodeWrapper">
                <label>Admin Secret Code</label>
                <input type="password" id="adminSecret" placeholder="Enter 4-digit code">
            </div>

            <button type="submit">Create Free Account</button>
        </form>

        <p id="message"></p>

        <div class="footer">
            Already a member? <a href="login.html">Sign In</a>
        </div>
    </div>

<script>
// Show/Hide Secret Code field
function toggleAdminCode() {
    const role = document.getElementById('role').value;
    const adminWrapper = document.getElementById('adminCodeWrapper');
    const adminInput = document.getElementById('adminSecret');

    if (role === 'ADMIN') {
        adminWrapper.style.display = 'block';
        adminInput.required = true;
    } else {
        adminWrapper.style.display = 'none';
        adminInput.required = false;
        adminInput.value = ""; 
    }
}

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const messageEl = document.getElementById('message');
    const role = document.getElementById('role').value;
    const adminSecretInput = document.getElementById('adminSecret').value;
    
    messageEl.innerText = "";
    messageEl.style.color = "#ef4444";

    // --- LOGIC CHECK FOR SECRET CODE ---
    if (role === 'ADMIN' && adminSecretInput !== '9062') {
        messageEl.innerText = "Invalid Secret Code. You cannot register as an Admin.";
        return;
    }

    const userData = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: role,
        adminSecret: adminSecretInput
    };

    try {
        const response = await fetch(' https://bongo-basket-backend-9.onrender.com/api/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });

        const data = await response.json();

        if (response.ok) {
            messageEl.style.color = "#10b981";
            messageEl.innerText = "Successfully Registered! Redirecting...";
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
            messageEl.innerText = data.error || "Registration failed.";
        }
    } catch (err) {
        messageEl.innerText = "Connection error. Ensure your Backend is running.";
    }
});
</script>

</body>
</html>
