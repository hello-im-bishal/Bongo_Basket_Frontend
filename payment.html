<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bongo Basket | Secure Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        /* MATCHING BRAND COLORS FROM DASHBOARD */
        :root {
            --brand-gradient: linear-gradient(90deg, #9c27b0, #f44336, #ff9800);
            --navy-dark: #1e1e3f;
            --bg-light: radial-gradient(circle at 20% 20%, #ffdee9 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, #b5fffc 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, #c3bef0 0%, transparent 40%),
                linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            --text-muted: #64748b;
            --white: #ffffff;
            --pink-accent: #db2777;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            /* base color to remove transparent edge */

            background-image:
                radial-gradient(circle at 20% 20%, #ffdee9 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, #b5fffc 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, #c3bef0 0%, transparent 40%),
                linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);

            background-repeat: no-repeat;
            background-size: cover;

            color: var(--navy);
        }

        /* NAVBAR MATCHING USER DASHBOARD */
        nav {
            background: var(--brand-gradient);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .logo-box img {
            height: 35px;
            background: white;
            padding: 5px;
            border-radius: 6px;
        }

        .container {
            padding: 40px 5%;
            max-width: 550px;
            margin: auto;
        }

        .payment-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: var(--navy-dark);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .order-summary {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin: 25px 0;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--navy-dark);
            font-weight: 500;
        }

        .grand-total-row {
            border-top: 2px dashed #cbd5e1;
            padding-top: 15px;
            margin-top: 15px;
            font-weight: 800;
            font-size: 1.4rem;
        }

        /* BUTTON MATCHING "ADD TO BASKET" STYLE */
        .pay-btn {
            background: var(--brand-gradient);
            color: white;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.4);
        }

        .pay-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }

        /* BRANDED LOADER */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #9c27b0;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .cancel-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--pink-accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <nav>
        <a href="userdashboad.html" class="logo-box">
            <img src="logo.png" alt="Logo">
            <h2 style="margin:0; font-size: 1.3rem; color: white;">BONGO BASKET</h2>
        </a>
        <div style="font-weight: 600; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px;">
            👤 <span id="userDisp">User</span>
        </div>
    </nav>

    <div class="container">
        <div class="payment-card">
            <h2>Secure Checkout</h2>
            <p style="color: #64748b;">Trusted by millions for safe transactions</p>

            <div id="loader" class="loader"></div>

            <div class="order-summary" id="summary">
                <div class="summary-row">
                    <span>Items Subtotal</span>
                    <span id="items-total">Fetching...</span>
                </div>
                <div class="summary-row">
                    <span>Shipping Fee</span>
                    <span style="color: #10b981; font-weight: 700;">FREE</span>
                </div>
                <div class="summary-row grand-total-row">
                    <span>Total Amount</span>
                    <span id="grand-total" style="color: #f44336;">₹0</span>
                </div>
            </div>

            <button id="payButton" class="pay-btn" onclick="initiatePayment()">Pay with Razorpay</button>

            <p class="status-msg">
                <img src="https://cdn-icons-png.flaticon.com/512/2504/2504911.png" width="12" alt="lock">
                Your payment is processed securely via SSL encryption.
            </p>

            <a href="cart.html" class="cancel-link">← Cancel and Return to Cart</a>
        </div>
    </div>

    <script>
        const API_BASE = " https://bongo-basket-backend-9.onrender.com";
        const currentUsername = localStorage.getItem("user");
        let orderTotal = 0;

        window.onload = async () => {
            if (!currentUsername) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userDisp').innerText = currentUsername;
            await fetchOrderAmount();
        };

        async function fetchOrderAmount() {
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch(`${API_BASE}/api/cart/items?username=${encodeURIComponent(currentUsername)}`);
                const data = await response.json();

                if (data.cart && data.cart.overall_total_price > 0) {
                    orderTotal = data.cart.overall_total_price;
                    document.getElementById('items-total').innerText = `₹${orderTotal.toLocaleString('en-IN')}`;
                    document.getElementById('grand-total').innerText = `₹${orderTotal.toLocaleString('en-IN')}`;
                } else {
                    alert("Your cart is empty!");
                    window.location.href = 'userdashboad.html';
                }
            } catch (error) {
                alert("Error loading order details.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        async function initiatePayment() {
            const payBtn = document.getElementById('payButton');
            payBtn.disabled = true;
            payBtn.innerText = "Processing...";

            try {
                const res = await fetch(`${API_BASE}/api/payment/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUsername,
                        totalAmount: orderTotal
                    })
                });

                const orderData = await res.json();
                if (!res.ok) throw new Error(orderData.message || "Failed to create order");

                const options = {
                    "key": "rzp_test_LqWBBDbgwot5lh",
                    "amount": orderTotal * 100,
                    "currency": "INR",
                    "name": "Bongo Basket",
                    "description": "Premium Order Payment",
                    "image": "images/logo.png",
                    "order_id": orderData.orderId,
                    "handler": function (response) {
                        verifyPayment(response, orderData.orderId);
                    },
                    "prefill": {
                        "name": currentUsername
                    },
                    "theme": {
                        "color": "#9c27b0" /* Matching brand purple */
                    }
                };

                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function (response) {
                    alert("Payment Failed: " + response.error.description);
                    payBtn.disabled = false;
                    payBtn.innerText = "Try Again";
                });
                rzp.open();

            } catch (error) {
                alert(error.message);
                payBtn.disabled = false;
                payBtn.innerText = "Pay Now";
            }
        }

        async function verifyPayment(rzpResponse, orderId) {
            try {
                const res = await fetch(`${API_BASE}/api/payment/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUsername,
                        razorpayOrderId: orderId,
                        razorpayPaymentId: rzpResponse.razorpay_payment_id,
                        razorpaySignature: rzpResponse.razorpay_signature
                    })
                });

                if (res.ok) {
                    alert("Payment Successful! Your order has been placed.");
                    window.location.href = 'userdashboad.html';
                } else {
                    alert("Payment verification failed. Please contact support.");
                }
            } catch (error) {
                alert("Error during verification.");
            }
        }
    </script>
</body>

</html>
